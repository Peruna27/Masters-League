<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woo Woo! 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --masters-green: #006747;
            --masters-green-dark: #00503a;
            --masters-green-deep: #003d2e;
            --gold: #c8a951;
            --gold-light: #d4b963;
            --cream: #f5f0e1;
            --cream-light: #faf7ef;
            --cream-dark: #e8e0ca;
            --board-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #555;
            --text-light: #888;
            --border: #d0c9b5;
            --border-light: #e5dfd0;
            --score-red: #c0392b;
            --score-blue: #2874a6;
            --counting-green: #006747;
            --counting-bg: rgba(0, 103, 71, 0.06);
            --cut-red: #c0392b;
        }

        body {
            font-family: 'Source Serif 4', Georgia, serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header — Masters green band ── */
        header {
            background: var(--masters-green);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        .header-inner {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            text-align: center;
        }

        .masters-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .masters-logo svg { height: 30px; }

        header h1 {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 24px;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 1px;
            letter-spacing: 1px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .refresh-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            padding: 5px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .refresh-btn:active {
            background: rgba(255,255,255,0.25);
        }

        .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .last-updated {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }

        /* ── Status Banner ── */
        .status-banner {
            text-align: center;
            padding: 6px 16px;
            background: var(--cream-dark);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-mid);
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Container ── */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 10px 40px;
        }

        /* ── Section Headers ── */
        .section-header {
            background: var(--masters-green);
            color: #fff;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 18px;
            letter-spacing: 2px;
            text-align: center;
            padding: 10px 16px;
            margin-top: 14px;
            border-radius: 4px 4px 0 0;
            text-transform: uppercase;
        }

        /* ── Scoreboard-style panels ── */
        .board {
            background: var(--board-white);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 2px;
        }

        /* ── Fantasy Standings ── */
        .standings { margin-bottom: 0; }

        .team-card {
            border-bottom: 1px solid var(--border-light);
        }

        .team-card:last-child { border-bottom: none; }

        .team-header {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }

        .team-header:active { background: var(--cream-light); }

        .team-rank {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 30px;
            line-height: 1;
            width: 32px;
            text-align: center;
            margin-right: 12px;
        }

        .rank-1 { color: var(--gold); }
        .rank-2 { color: #8a8a8a; }
        .rank-3 { color: #a67c52; }

        .team-info { flex: 1; }

        .team-name {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 18px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .team-detail {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            color: var(--text-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .team-score { text-align: right; }

        .team-total {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 32px;
            line-height: 1;
        }

        .team-total-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 9px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .toggle-arrow {
            font-size: 10px;
            color: var(--text-light);
            transition: transform 0.3s ease;
            margin-left: 8px;
        }

        .team-card.open .toggle-arrow { transform: rotate(180deg); }

        .team-players {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }

        .team-players.open { max-height: 500px; }

        /* ── Player rows (inside team cards) ── */
        .player-row {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            font-size: 13px;
            border-top: 1px solid var(--border-light);
        }

        .player-row.counting { background: var(--counting-bg); }
        .player-row.bench { opacity: 0.4; }
        .player-row.cut { opacity: 0.3; }

        .player-pos {
            width: 32px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
        }

        .player-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .player-row.counting .player-dot {
            background: var(--counting-green);
        }
        .player-row.bench .player-dot {
            border: 1.5px solid var(--text-light);
        }
        .player-row.cut .player-dot {
            background: var(--cut-red);
        }

        .player-name {
            flex: 1;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .player-row.cut .player-name {
            text-decoration: line-through;
            text-decoration-color: rgba(192,57,43,0.4);
        }

        .player-rounds {
            display: flex;
            gap: 0;
        }

        .player-rd {
            width: 22px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-light);
            font-family: 'DM Sans', sans-serif;
        }

        .player-thru {
            width: 40px;
            text-align: center;
            font-size: 11px;
            color: var(--text-light);
            font-weight: 500;
        }

        .player-score {
            width: 38px;
            text-align: right;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 15px;
        }

        /* ── Score colors — matches Masters board (red for under par) ── */
        .score-under { color: var(--score-red); }
        .score-over { color: var(--text-dark); }
        .score-even { color: var(--text-dark); }

        /* ── Legend ── */
        .legend {
            display: flex;
            gap: 14px;
            justify-content: center;
            padding: 10px 8px;
            font-size: 10px;
            color: var(--text-light);
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        /* ── Tournament Leaderboard ── */
        .lb-header-row {
            display: flex;
            padding: 8px 14px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: var(--cream-light);
            border-bottom: 2px solid var(--masters-green);
        }

        .lb-row {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-light);
        }

        .lb-row:last-child { border-bottom: none; }

        .lb-row.rostered {
            background: rgba(200, 169, 81, 0.08);
        }

        .lb-row:nth-child(even):not(.rostered) {
            background: var(--cream-light);
        }

        .lb-pos {
            width: 30px;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 800;
            color: var(--text-light);
            font-size: 12px;
        }

        .lb-name {
            flex: 1;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lb-team-tag {
            font-size: 9px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 3px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .tag-mike { background: #dbeafe; color: #1d4ed8; }
        .tag-joe { background: #fce7f3; color: #be185d; }
        .tag-reed { background: #fef3c7; color: #92400e; }

        .lb-rounds {
            display: flex;
            gap: 0;
        }

        .lb-rd {
            width: 22px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-light);
            font-family: 'DM Sans', sans-serif;
        }

        .lb-thru {
            width: 40px;
            text-align: center;
            font-size: 11px;
            color: var(--text-light);
            font-weight: 500;
        }

        .lb-score {
            width: 40px;
            text-align: right;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 14px;
        }

        /* ── Error ── */
        .error-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        .error-msg .retry-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            background: var(--masters-green);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 16px 12px;
            font-size: 10px;
            color: var(--text-light);
            letter-spacing: 0.3px;
        }

        .footer .masters-wordmark {
            font-family: 'Playfair Display', Georgia, serif;
            font-style: italic;
            color: var(--masters-green);
            font-weight: 700;
        }

        /* ── Responsive ── */
        @media (min-width: 500px) {
            header h1 { font-size: 26px; }
            .container { padding: 0 16px 40px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="masters-logo">
                <svg viewBox="0 0 60 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <line x1="10" y1="3" x2="10" y2="29" stroke="#c8a951" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M11 3 L30 7.5 L11 12 Z" fill="#c8a951"/>
                    <circle cx="10" cy="29" r="1.2" fill="#c8a951" opacity="0.6"/>
                </svg>
                <h1>Woo Woo!</h1>
            </div>
            <div class="subtitle">Augusta National Golf Club &middot; 2026</div>
            <div class="header-controls">
                <button class="refresh-btn" onclick="fetchData()">
                    <span id="refresh-text">Refresh</span>
                </button>
                <div class="spinner" id="spinner"></div>
                <span class="last-updated" id="last-updated"></span>
            </div>
        </div>
    </header>

    <div id="status-banner"></div>

    <div class="container">
        <div class="section-header">Fantasy Standings</div>
        <div class="board">
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:var(--counting-green)"></div> Top 4</div>
                <div class="legend-item"><div class="legend-dot" style="border:1.5px solid var(--text-light)"></div> Bench</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--cut-red)"></div> MC / WD</div>
            </div>
            <div class="standings" id="standings"></div>
        </div>

        <div class="section-header">Leaders</div>
        <div class="board">
            <div class="leaderboard" id="leaderboard"></div>
        </div>

        <div class="footer">
            Auto-refreshes every 60 seconds &middot; Scores via ESPN<br>
            <span class="masters-wordmark">Woo Woo!</span>
        </div>
    </div>

    <script>
        // ── TEAM DEFINITIONS ──
        const TEAMS = {
            'Mike': {
                players: [
                    { name: 'Jon Rahm', search: ['rahm'] },
                    { name: 'Matt Fitzpatrick', search: ['fitzpatrick'] },
                    { name: 'Tommy Fleetwood', search: ['fleetwood'] },
                    { name: 'Brooks Koepka', search: ['koepka'] },
                    { name: 'Justin Rose', search: ['justin rose'] },
                    { name: 'K.H. Lee', search: ['k.h. lee', 'kyoung-hoon', 'kyounghoon lee'] },
                    { name: 'Si Woo Kim', search: ['si woo kim', 'si woo'] },
                    { name: 'Shane Lowry', search: ['lowry'] }
                ]
            },
            'Joe': {
                players: [
                    { name: 'Bryson DeChambeau', search: ['dechambeau'] },
                    { name: 'Xander Schauffele', search: ['schauffele'] },
                    { name: 'Hideki Matsuyama', search: ['matsuyama'] },
                    { name: 'Robert MacIntyre', search: ['macintyre', 'mcintyre'] },
                    { name: 'Patrick Reed', search: ['patrick reed'] },
                    { name: 'Jason Day', search: ['jason day'] },
                    { name: 'Jordan Spieth', search: ['spieth'] },
                    { name: 'Jake Knapp', search: ['knapp'] }
                ]
            },
            'Reed': {
                players: [
                    { name: 'Rory McIlroy', search: ['mcilroy'] },
                    { name: 'Ludvig Aberg', search: ['aberg', 'åberg'] },
                    { name: 'Collin Morikawa', search: ['morikawa'] },
                    { name: 'Cameron Young', search: ['cameron young'] },
                    { name: 'Viktor Hovland', search: ['hovland'] },
                    { name: 'Akshay Bhatia', search: ['bhatia'] },
                    { name: 'Patrick Cantlay', search: ['cantlay'] },
                    { name: 'Cameron Smith', search: ['cameron smith'] }
                ]
            }
        };

        const TEAM_COLORS = { 'Mike': 'tag-mike', 'Joe': 'tag-joe', 'Reed': 'tag-reed' };

        const searchEntries = [];
        for (const [team, data] of Object.entries(TEAMS)) {
            for (const p of data.players) {
                for (const s of p.search) {
                    searchEntries.push({ term: s.toLowerCase(), team, playerDef: p });
                }
            }
        }
        searchEntries.sort((a, b) => b.term.length - a.term.length);

        let leaderboardData = [];
        let openTeams = new Set(['Mike', 'Joe', 'Reed']);
        let consecutiveErrors = 0;
        const CACHE_KEY = 'masters_fantasy_2026';

        const ESPN_URLS = [
            'https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard',
            'https://site.web.api.espn.com/apis/v2/sports/golf/pga/leaderboard'
        ];

        function matchPlayer(espnName) {
            const lower = espnName.toLowerCase();
            for (const entry of searchEntries) {
                if (lower.includes(entry.term)) return { team: entry.team, playerDef: entry.playerDef };
            }
            return null;
        }

        function parseScore(val) {
            if (!val || val === 'E' || val === 'Even' || val === 'even') return 0;
            const n = parseInt(val);
            return isNaN(n) ? 999 : n;
        }

        function fmt(num) {
            if (num === 999 || num == null) return '--';
            if (num === 0) return 'E';
            return num > 0 ? '+' + num : '' + num;
        }

        function cls(num) {
            if (num === 999 || num == null) return '';
            if (num < 0) return 'score-under';
            if (num > 0) return 'score-over';
            return 'score-even';
        }

        function cacheData(raw) {
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: raw })); } catch(e) {}
        }

        function loadCache() {
            try {
                const c = JSON.parse(localStorage.getItem(CACHE_KEY));
                if (c && c.data) return c;
            } catch(e) {}
            return null;
        }

        function parseCompetitors(data) {
            const event = data.events && data.events[0];
            if (!event) return null;

            const competition = event.competitions && event.competitions[0];
            const competitors = competition ? competition.competitors || [] : [];
            const tournamentName = event.name || '';
            const tournamentStatus = event.status ? (event.status.type ? event.status.type.description : '') : '';

            const parsed = competitors.map(c => {
                try {
                    const athlete = c.athlete || {};
                    const displayName = athlete.displayName || 'Unknown';
                    const score = c.score != null ? c.score : (c.statistics && c.statistics[0] ? c.statistics[0].displayValue : 'E');
                    const scoreToPar = parseScore(typeof score === 'string' ? score : String(score));

                    let today = '--';
                    const rounds = [];
                    if (c.linescores && c.linescores.length > 0) {
                        for (const ls of c.linescores) {
                            rounds.push(ls && ls.displayValue ? ls.displayValue : '--');
                        }
                        const last = c.linescores[c.linescores.length - 1];
                        if (last && last.displayValue) today = last.displayValue;
                    }

                    let thru = '', isCut = false, isWD = false;
                    if (c.status) {
                        const st = c.status;
                        const desc = st.type ? st.type.description : '';
                        const dv = (st.displayValue || '').toUpperCase();
                        if (desc === 'Cut' || dv === 'CUT' || dv === 'MC') { thru = 'CUT'; isCut = true; }
                        else if (desc === 'Withdrawn' || dv === 'WD') { thru = 'WD'; isWD = true; }
                        else if (desc === 'Disqualified' || dv === 'DQ') { thru = 'DQ'; isWD = true; }
                        else { thru = st.displayValue || ''; }
                    }

                    const position = c.sortOrder || 999;
                    const posDisplay = c.status && c.status.position ? c.status.position.displayName : (isCut ? 'CUT' : '');
                    const match = matchPlayer(displayName);

                    return {
                        name: displayName, scoreToPar, scoreDisplay: fmt(scoreToPar),
                        today, thru, rounds, position, posDisplay: posDisplay || String(position),
                        isCut, isWD, team: match ? match.team : null,
                        rosterName: match ? match.playerDef.name : null
                    };
                } catch (e) {
                    console.warn('Skipping malformed competitor:', e);
                    return null;
                }
            }).filter(Boolean);

            parsed.sort((a, b) => a.position - b.position);
            return { competitors: parsed, tournamentName, tournamentStatus };
        }

        async function fetchData() {
            const spinner = document.getElementById('spinner');
            const refreshText = document.getElementById('refresh-text');
            spinner.style.display = 'inline-block';
            refreshText.textContent = 'Loading';

            let raw = null;
            let fetchError = null;

            for (const url of ESPN_URLS) {
                try {
                    const resp = await fetch(url, { signal: AbortSignal.timeout(10000) });
                    if (!resp.ok) continue;
                    raw = await resp.json();
                    break;
                } catch (e) { fetchError = e; }
            }

            if (!raw) {
                const cached = loadCache();
                if (cached) {
                    raw = cached.data;
                    const age = Math.round((Date.now() - cached.ts) / 60000);
                    document.getElementById('last-updated').textContent =
                        'Cached (' + age + 'm ago)';
                } else {
                    consecutiveErrors++;
                    const retryIn = Math.min(consecutiveErrors * 30, 300);
                    if (leaderboardData.length === 0) {
                        document.getElementById('standings').innerHTML =
                            '<div class="error-msg">Could not load scores<br><small style="opacity:0.6">' +
                            (fetchError ? fetchError.message : 'All endpoints failed') +
                            '</small><br><small style="opacity:0.4">Retrying in ' + retryIn + 's</small>' +
                            '<br><button class="retry-btn" onclick="fetchData()">Try Now</button></div>';
                    } else {
                        document.getElementById('last-updated').textContent = 'Refresh failed';
                    }
                    setTimeout(fetchData, retryIn * 1000);
                    spinner.style.display = 'none';
                    refreshText.textContent = 'Refresh';
                    return;
                }
            } else {
                cacheData(raw);
                consecutiveErrors = 0;
            }

            try {
                const result = parseCompetitors(raw);
                if (!result || result.competitors.length === 0) {
                    throw new Error('No competitors found');
                }

                leaderboardData = result.competitors;

                const banner = document.getElementById('status-banner');
                const isMasters = (result.tournamentName || '').toLowerCase().includes('masters');
                if (!isMasters && result.tournamentName) {
                    banner.className = 'status-banner';
                    banner.textContent = 'Showing: ' + result.tournamentName;
                } else if (result.tournamentStatus && result.tournamentStatus !== 'In Progress') {
                    banner.className = 'status-banner';
                    banner.textContent = result.tournamentStatus;
                } else {
                    banner.className = '';
                    banner.textContent = '';
                }

                let matched = 0, total = 0;
                for (const t of Object.values(TEAMS)) {
                    for (const p of t.players) {
                        total++;
                        if (leaderboardData.some(ld => ld.rosterName === p.name)) matched++;
                    }
                }
                if (matched < total) console.warn('Matched ' + matched + '/' + total + ' roster players');

                render();
                if (!document.getElementById('last-updated').textContent.startsWith('Cached')) {
                    document.getElementById('last-updated').textContent =
                        'Updated ' + new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                }
            } catch (err) {
                console.error('Parse error:', err);
                if (leaderboardData.length === 0) {
                    document.getElementById('standings').innerHTML =
                        '<div class="error-msg">Error reading data<br><small style="opacity:0.6">' +
                        err.message + '</small><br><button class="retry-btn" onclick="fetchData()">Try Again</button></div>';
                }
            } finally {
                spinner.style.display = 'none';
                refreshText.textContent = 'Refresh';
            }
        }

        function render() {
            renderStandings();
            renderLeaderboard();
        }

        function renderStandings() {
            const el = document.getElementById('standings');

            const teams = Object.entries(TEAMS).map(([name, data]) => {
                const players = data.players.map(p => {
                    const found = leaderboardData.find(ld => ld.rosterName === p.name);
                    return {
                        name: p.name,
                        scoreToPar: found ? found.scoreToPar : 0,
                        scoreDisplay: found ? found.scoreDisplay : 'E',
                        thru: found ? found.thru : '--',
                        posDisplay: found ? found.posDisplay : '--',
                        rounds: found ? found.rounds : [],
                        isCut: found ? found.isCut : false,
                        isWD: found ? found.isWD : false
                    };
                });

                players.sort((a, b) => {
                    const aOut = a.isCut || a.isWD;
                    const bOut = b.isCut || b.isWD;
                    if (aOut && !bOut) return 1;
                    if (!aOut && bOut) return -1;
                    return a.scoreToPar - b.scoreToPar;
                });

                const top4 = players.slice(0, 4);
                const total = top4.reduce((s, p) => s + p.scoreToPar, 0);

                return { name, players, total, totalDisplay: fmt(total) };
            });

            teams.sort((a, b) => a.total - b.total);

            el.innerHTML = teams.map((t, idx) => {
                const rank = idx + 1;
                const isOpen = openTeams.has(t.name);
                return `
                    <div class="team-card ${isOpen ? 'open' : ''}" id="card-${t.name}">
                        <div class="team-header" onclick="toggleTeam('${t.name}')">
                            <div class="team-rank rank-${rank}">${rank}</div>
                            <div class="team-info">
                                <div class="team-name">${t.name}</div>
                                <div class="team-detail">Best 4 of 8</div>
                            </div>
                            <div class="team-score">
                                <div class="team-total ${cls(t.total)}">${t.totalDisplay}</div>
                                <div class="team-total-label">Total</div>
                            </div>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="team-players ${isOpen ? 'open' : ''}">
                            ${t.players.map((p, i) => {
                                const counting = i < 4 && !p.isCut && !p.isWD;
                                const rowCls = (p.isCut || p.isWD) ? 'cut' : (counting ? 'counting' : 'bench');
                                return `
                                    <div class="player-row ${rowCls}">
                                        <div class="player-pos">${p.posDisplay}</div>
                                        <div class="player-dot"></div>
                                        <div class="player-name">${p.name}</div>
                                        <div class="player-rounds">${[0,1,2,3].map(r => '<div class="player-rd">' + (p.rounds[r] || '--') + '</div>').join('')}</div>
                                        <div class="player-thru">${p.thru}</div>
                                        <div class="player-score ${cls(p.scoreToPar)}">${p.scoreDisplay}</div>
                                    </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            }).join('');
        }

        function renderLeaderboard() {
            const el = document.getElementById('leaderboard');
            const rows = leaderboardData.slice(0, 30);

            el.innerHTML = `
                <div class="lb-header-row">
                    <div class="lb-pos">Pos</div>
                    <div class="lb-name">Player</div>
                    <div class="lb-rounds">${['R1','R2','R3','R4'].map(r => '<div class="lb-rd">' + r + '</div>').join('')}</div>
                    <div class="lb-thru">Thru</div>
                    <div class="lb-score">Tot</div>
                </div>
                ${rows.map(p => `
                    <div class="lb-row ${p.team ? 'rostered' : ''}">
                        <div class="lb-pos">${p.posDisplay}</div>
                        <div class="lb-name">
                            <span>${p.name}</span>
                            ${p.team ? `<span class="lb-team-tag ${TEAM_COLORS[p.team]}">${p.team}</span>` : ''}
                        </div>
                        <div class="lb-rounds">${[0,1,2,3].map(r => '<div class="lb-rd">' + (p.rounds[r] || '--') + '</div>').join('')}</div>
                        <div class="lb-thru">${p.thru}</div>
                        <div class="lb-score ${cls(p.scoreToPar)}">${p.scoreDisplay}</div>
                    </div>`).join('')}`;
        }

        function toggleTeam(name) {
            if (openTeams.has(name)) openTeams.delete(name);
            else openTeams.add(name);
            const card = document.getElementById('card-' + name);
            card.classList.toggle('open');
            card.querySelector('.team-players').classList.toggle('open');
        }

        // ── DUMMY DATA ──
        function loadDummyData() {
            const dummyPlayers = [
                { name: 'Jon Rahm', scoreToPar: -6, position: 3 },
                { name: 'Matt Fitzpatrick', scoreToPar: -2, position: 12 },
                { name: 'Tommy Fleetwood', scoreToPar: -4, position: 7 },
                { name: 'Brooks Koepka', scoreToPar: 1, position: 28 },
                { name: 'Justin Rose', scoreToPar: -1, position: 18 },
                { name: 'K.H. Lee', scoreToPar: 3, position: 42 },
                { name: 'Si Woo Kim', scoreToPar: -3, position: 9 },
                { name: 'Shane Lowry', scoreToPar: 0, position: 22 },
                { name: 'Bryson DeChambeau', scoreToPar: -8, position: 1 },
                { name: 'Xander Schauffele', scoreToPar: -5, position: 4 },
                { name: 'Hideki Matsuyama', scoreToPar: -3, position: 10 },
                { name: 'Robert MacIntyre', scoreToPar: 0, position: 20 },
                { name: 'Patrick Reed', scoreToPar: 4, position: 51 },
                { name: 'Jason Day', scoreToPar: 1, position: 30 },
                { name: 'Jordan Spieth', scoreToPar: -7, position: 2 },
                { name: 'Jake Knapp', scoreToPar: 2, position: 36 },
                { name: 'Rory McIlroy', scoreToPar: -5, position: 5 },
                { name: 'Ludvig Aberg', scoreToPar: -4, position: 6 },
                { name: 'Collin Morikawa', scoreToPar: -3, position: 8 },
                { name: 'Cameron Young', scoreToPar: 0, position: 21 },
                { name: 'Viktor Hovland', scoreToPar: -1, position: 15 },
                { name: 'Akshay Bhatia', scoreToPar: 2, position: 35 },
                { name: 'Patrick Cantlay', scoreToPar: -2, position: 11 },
                { name: 'Cameron Smith', scoreToPar: 1, position: 27 },
                { name: 'Scottie Scheffler', scoreToPar: -6, position: 3 },
                { name: 'Justin Thomas', scoreToPar: -2, position: 13 },
                { name: 'Tony Finau', scoreToPar: -1, position: 16 },
                { name: 'Dustin Johnson', scoreToPar: 0, position: 23 },
                { name: 'Phil Mickelson', scoreToPar: 3, position: 44 },
                { name: 'Tiger Woods', scoreToPar: 5, position: 58 },
            ];

            leaderboardData = dummyPlayers.map(p => {
                const match = matchPlayer(p.name);
                const thrus = ['F', 'Thru 14', 'Thru 11', 'Thru 16', 'Thru 9', 'Thru 7'];
                const sampleRounds = [
                    ['68','70','--','--'], ['71','72','--','--'], ['69','71','--','--'],
                    ['73','74','--','--'], ['70','69','--','--'], ['72','73','--','--'],
                    ['67','71','--','--'], ['70','70','--','--'], ['66','68','--','--'],
                    ['69','70','--','--']
                ];
                return {
                    name: p.name, scoreToPar: p.scoreToPar, scoreDisplay: fmt(p.scoreToPar),
                    today: sampleRounds[p.position % sampleRounds.length][1],
                    rounds: sampleRounds[p.position % sampleRounds.length],
                    thru: thrus[p.position % thrus.length],
                    position: p.position, posDisplay: 'T' + p.position,
                    isCut: false, isWD: false,
                    team: match ? match.team : null,
                    rosterName: match ? match.playerDef.name : null
                };
            });

            leaderboardData.sort((a, b) => a.position - b.position);

            const banner = document.getElementById('status-banner');
            banner.className = 'status-banner';
            banner.textContent = 'Preview Mode — Live scores load when hosted';
            render();
            document.getElementById('last-updated').textContent = 'Sample data';
        }

        // ── INIT ──
        fetchData().then(() => {
            if (leaderboardData.length === 0) loadDummyData();
        });
        let refreshInterval = setInterval(fetchData, 60000);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearInterval(refreshInterval);
            } else {
                fetchData();
                refreshInterval = setInterval(fetchData, 60000);
            }
        });
    </script>
</body>
