<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Woo Woo! 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --masters-green: #006747;
            --masters-green-dark: #00503a;
            --masters-green-deep: #003d2e;
            --gold: #c8a951;
            --gold-light: #d4b963;
            --cream: #f5f0e1;
            --cream-light: #faf7ef;
            --cream-dark: #e8e0ca;
            --board-white: #ffffff;
            --text-dark: #1a1a1a;
            --text-mid: #555;
            --text-light: #888;
            --border: #d0c9b5;
            --border-light: #e5dfd0;
            --score-red: #c0392b;
            --score-blue: #2874a6;
            --counting-green: #006747;
            --counting-bg: rgba(0, 103, 71, 0.06);
            --cut-red: #c0392b;
        }

        body {
            font-family: 'Source Serif 4', Georgia, serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header — Masters green band ── */
        header {
            background: var(--masters-green);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        .header-inner {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
            text-align: center;
        }

        .header-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .masters-logo-img {
            height: 44px;
            width: auto;
        }

        header h1 {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-weight: 700;
            font-style: italic;
            font-size: 26px;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .subtitle {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-style: italic;
            font-size: 11px;
            color: rgba(255,255,255,0.6);
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .refresh-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            padding: 5px 16px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .refresh-btn:active {
            background: rgba(255,255,255,0.25);
        }

        .spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .last-updated {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
        }

        /* ── Status Banner ── */
        .status-banner {
            text-align: center;
            padding: 6px 16px;
            background: var(--cream-dark);
            font-size: 11px;
            font-weight: 600;
            color: var(--text-mid);
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        /* ── Container ── */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 10px 40px;
        }

        /* ── Section Headers ── */
        .section-header {
            background: var(--masters-green);
            color: #fff;
            font-family: 'Libre Baskerville', Georgia, serif;
            font-weight: 700;
            font-style: italic;
            font-size: 17px;
            letter-spacing: 0.5px;
            text-align: center;
            padding: 10px 16px;
            margin-top: 14px;
            border-radius: 4px 4px 0 0;
        }

        /* ── Scoreboard-style panels ── */
        .board {
            background: var(--board-white);
            border: 1px solid var(--border);
            border-top: none;
            border-radius: 0 0 4px 4px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            margin-bottom: 2px;
        }

        /* ── Fantasy Standings ── */
        .standings { margin-bottom: 0; }

        .team-card {
            border-bottom: 1px solid var(--border-light);
        }

        .team-card:last-child { border-bottom: none; }

        .team-header {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.15s;
        }

        .team-header:active { background: var(--cream-light); }

        .team-rank {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 30px;
            line-height: 1;
            width: 32px;
            text-align: center;
            margin-right: 12px;
        }

        .rank-1 { color: var(--gold); }
        .rank-2 { color: #8a8a8a; }
        .rank-3 { color: #a67c52; }

        .team-info { flex: 1; }

        .team-name {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 18px;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .team-detail {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            color: var(--text-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .team-score { text-align: right; }

        .team-total {
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 32px;
            line-height: 1;
        }

        .team-total-label {
            font-family: 'DM Sans', sans-serif;
            font-size: 9px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
        }

        .toggle-arrow {
            font-size: 10px;
            color: var(--text-light);
            transition: transform 0.3s ease;
            margin-left: 8px;
        }

        .team-card.open .toggle-arrow { transform: rotate(180deg); }

        .team-players {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease;
        }

        .team-players.open { max-height: 500px; }

        /* ── Player rows (inside team cards) ── */
        .player-row {
            display: flex;
            align-items: center;
            padding: 8px 14px;
            font-size: 13px;
            border-top: 1px solid var(--border-light);
        }

        .player-row.counting { background: var(--counting-bg); }
        .player-row.bench { opacity: 0.4; }
        .player-row.cut { opacity: 0.3; }

        .player-pos {
            width: 32px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-light);
        }

        .player-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
        }

        .player-row.counting .player-dot {
            background: var(--counting-green);
        }
        .player-row.bench .player-dot {
            border: 1.5px solid var(--text-light);
        }
        .player-row.cut .player-dot {
            background: var(--cut-red);
        }

        .player-name {
            flex: 1;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .player-row.cut .player-name {
            text-decoration: line-through;
            text-decoration-color: rgba(192,57,43,0.4);
        }

        .player-rounds {
            display: flex;
            gap: 0;
        }

        .player-rd {
            width: 22px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-light);
            font-family: 'DM Sans', sans-serif;
        }

        .player-thru {
            width: 40px;
            text-align: center;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
            color: var(--text-light);
            font-weight: 500;
        }

        .player-today {
            width: 32px;
            text-align: right;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 700;
            font-size: 12px;
            color: var(--text-dark);
        }

        .player-score {
            width: 38px;
            text-align: right;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 15px;
        }

        /* ── Score colors — matches Masters board (red for under par) ── */
        .score-under { color: var(--score-red) !important; }
        .score-over { color: var(--text-dark) !important; }
        .score-even { color: var(--text-dark) !important; }

        /* ── Legend ── */
        .legend {
            display: flex;
            gap: 14px;
            justify-content: center;
            padding: 10px 8px;
            font-size: 10px;
            color: var(--text-light);
            font-weight: 500;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .legend-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        /* ── Tournament Leaderboard ── */
        .lb-header-row {
            display: flex;
            padding: 6px 10px;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--cream-light);
            border-bottom: 2px solid var(--masters-green);
            align-items: center;
            min-height: 38px;
        }

        .lb-row {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            font-size: 13px;
            border-bottom: 1px solid var(--border-light);
            min-height: 38px;
        }

        .lb-row:last-child { border-bottom: none; }

        .lb-row.rostered {
            background: rgba(0, 103, 71, 0.08);
            border-left: 3px solid var(--masters-green);
        }

        .lb-pos {
            width: 24px;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 800;
            color: var(--text-light);
            font-size: 11px;
            flex-shrink: 0;
        }

        .lb-team {
            width: 38px;
            text-align: center;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .team-mike { color: #1d4ed8; }
        .team-joe { color: #be185d; }
        .team-reed { color: #92400e; }

        .lb-name {
            flex: 1;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
            padding-right: 4px;
        }

        .lb-rounds {
            display: flex;
            gap: 0;
            flex-shrink: 0;
        }

        .lb-rd {
            width: 20px;
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-light);
            font-family: 'DM Sans', sans-serif;
        }

        .lb-thru {
            width: 46px;
            text-align: center;
            font-size: 10px;
            color: var(--text-light);
            font-weight: 500;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.2;
        }

        .lb-thru-label {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
            font-weight: 600;
        }

        .lb-thru-val {
            font-size: 10px;
            font-weight: 600;
        }

        .lb-today {
            width: 30px;
            text-align: right;
            font-size: 11px;
            color: var(--text-dark);
            font-weight: 600;
            flex-shrink: 0;
        }

        .lb-score {
            width: 34px;
            text-align: right;
            font-family: 'Source Serif 4', Georgia, serif;
            font-weight: 900;
            font-size: 15px;
            flex-shrink: 0;
        }

        .lb-header-row .lb-score,
        .lb-header-row .lb-today,
        .lb-header-row .lb-thru,
        .lb-header-row .lb-pos,
        .lb-header-row .lb-team,
        .lb-header-row .lb-name,
        .lb-header-row .lb-rd {
            font-family: 'DM Sans', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-light);
        }

        /* ── Error ── */
        .error-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
            font-size: 14px;
        }

        .error-msg .retry-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 8px 20px;
            background: var(--masters-green);
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
        }

        /* ── Footer ── */
        .footer {
            text-align: center;
            padding: 16px 12px;
            font-size: 10px;
            color: var(--text-light);
            letter-spacing: 0.3px;
        }

        .footer .masters-wordmark {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-style: italic;
            color: var(--masters-green);
            font-weight: 700;
        }

        /* ── Splash Screen ── */
        .splash {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }

        .splash.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .splash img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .splash-text {
            position: absolute;
            bottom: 14%;
            font-family: 'Libre Baskerville', Georgia, serif;
            font-style: italic;
            font-size: 28px;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.8);
            letter-spacing: 1px;
            animation: pulseText 1.5s ease-in-out infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .splash-tap {
            position: absolute;
            bottom: 6%;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── Responsive ── */
        @media (min-width: 500px) {
            header h1 { font-size: 26px; }
            .container { padding: 0 16px 40px; }
        }
    </style>
</head>
<body>
    <div class="splash" id="splash" onclick="dismissSplash()">
        <img id="splash-gif" alt="Woo Woo!">
        <div class="splash-text">Woo Woo!</div>
        <div class="splash-tap">Tap to skip</div>
    </div>
    <header>
        <div class="header-inner">
            <div class="header-title">
                <img src="https://images.seeklogo.com/logo-png/28/1/masters-golf-tournament-logo-png_seeklogo-289048.png" alt="Masters" class="masters-logo-img">
                <h1>Woo Woo!</h1>
            </div>
            <div class="subtitle">Augusta National Golf Club &middot; 2026</div>
            <div class="header-controls">
                <button class="refresh-btn" onclick="fetchData()">
                    <span id="refresh-text">Refresh</span>
                </button>
                <div class="spinner" id="spinner"></div>
                <span class="last-updated" id="last-updated"></span>
            </div>
        </div>
    </header>

    <div id="status-banner"></div>

    <div class="container">
        <div class="section-header">Standings</div>
        <div class="board">
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:var(--counting-green)"></div> Top 4</div>
                <div class="legend-item"><div class="legend-dot" style="border:1.5px solid var(--text-light)"></div> Bench</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--cut-red)"></div> MC / WD</div>
            </div>
            <div class="standings" id="standings"></div>
        </div>

        <div class="section-header">Leaders</div>
        <div class="board">
            <div class="leaderboard" id="leaderboard"></div>
        </div>

        <div class="footer">
            Auto-refreshes every 60 seconds &middot; Scores via ESPN<br>
            <span class="masters-wordmark">Woo Woo!</span>
        </div>
    </div>

    <script>
        // ── TEAM DEFINITIONS ──
        const TEAMS = {
            'Mike': {
                players: [
                    { name: 'Jon Rahm', search: ['rahm'] },
                    { name: 'Matt Fitzpatrick', search: ['fitzpatrick'] },
                    { name: 'Tommy Fleetwood', search: ['fleetwood'] },
                    { name: 'Brooks Koepka', search: ['koepka'] },
                    { name: 'Justin Rose', search: ['justin rose'] },
                    { name: 'Min Woo Lee', search: ['min woo lee', 'min woo'] },
                    { name: 'Si Woo Kim', search: ['si woo kim', 'si woo'] },
                    { name: 'Shane Lowry', search: ['lowry'] }
                ]
            },
            'Joe': {
                players: [
                    { name: 'Bryson DeChambeau', search: ['dechambeau'] },
                    { name: 'Xander Schauffele', search: ['schauffele'] },
                    { name: 'Hideki Matsuyama', search: ['matsuyama'] },
                    { name: 'Robert MacIntyre', search: ['macintyre', 'mcintyre'] },
                    { name: 'Patrick Reed', search: ['patrick reed'] },
                    { name: 'Jason Day', search: ['jason day'] },
                    { name: 'Jordan Spieth', search: ['spieth'] },
                    { name: 'Jake Knapp', search: ['knapp'] }
                ]
            },
            'Reed': {
                players: [
                    { name: 'Rory McIlroy', search: ['mcilroy'] },
                    { name: 'Ludvig Aberg', search: ['aberg', 'åberg'] },
                    { name: 'Collin Morikawa', search: ['morikawa'] },
                    { name: 'Cameron Young', search: ['cameron young'] },
                    { name: 'Viktor Hovland', search: ['hovland'] },
                    { name: 'Akshay Bhatia', search: ['bhatia'] },
                    { name: 'Patrick Cantlay', search: ['cantlay'] },
                    { name: 'Cameron Smith', search: ['cameron smith'] }
                ]
            }
        };

        const TEAM_COLORS = { 'Mike': 'team-mike', 'Joe': 'team-joe', 'Reed': 'team-reed' };

        const searchEntries = [];
        for (const [team, data] of Object.entries(TEAMS)) {
            for (const p of data.players) {
                for (const s of p.search) {
                    searchEntries.push({ term: s.toLowerCase(), team, playerDef: p });
                }
            }
        }
        searchEntries.sort((a, b) => b.term.length - a.term.length);

        let leaderboardData = [];
        let openTeams = new Set(['Mike', 'Joe', 'Reed']);
        let consecutiveErrors = 0;
        const CACHE_KEY = 'masters_fantasy_2026';

        // Masters.com JSON feed (primary), ESPN API (fallback)
        const MASTERS_URL = 'https://www.masters.com/en_US/scores/feeds/2026/scores.json';
        const ESPN_API_URLS = [
            'https://site.api.espn.com/apis/site/v2/sports/golf/pga/leaderboard'
        ];

        // "Bryson DeChambeau" -> "B. DeChambeau"
        function shortName(full) {
            const parts = full.trim().split(' ');
            if (parts.length < 2) return full;
            return parts[0][0] + '. ' + parts.slice(1).join(' ');
        }

        function fmtThru(val) {
            if (!val || val === '--') return '<span class="lb-thru-label">Thru</span><span class="lb-thru-val">--</span>';
            if (val === 'CUT' || val === 'WD' || val === 'DQ') return '<span class="lb-thru-label">&nbsp;</span><span class="lb-thru-val">' + val + '</span>';
            // Tee time (contains AM/PM)
            if (/[AP]M/i.test(val)) return '<span class="lb-thru-label">Tee</span><span class="lb-thru-val">' + val + '</span>';
            const num = val.replace(/^Thru\s*/i, '');
            return '<span class="lb-thru-label">Thru</span><span class="lb-thru-val">' + num + '</span>';
        }

        function matchPlayer(espnName) {
            // Normalize accented chars so Åberg matches aberg, etc.
            const lower = espnName.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            for (const entry of searchEntries) {
                if (lower.includes(entry.term)) return { team: entry.team, playerDef: entry.playerDef };
            }
            return null;
        }

        function parseScore(val) {
            if (!val || val === 'E' || val === 'Even' || val === 'even') return 0;
            const n = parseInt(val);
            return isNaN(n) ? 999 : n;
        }

        function fmt(num) {
            if (num === 999 || num == null) return '--';
            if (num === 0) return 'E';
            return num > 0 ? '+' + num : '' + num;
        }

        function cls(num) {
            if (num === 999 || num == null) return '';
            if (num < 0) return 'score-under';
            if (num > 0) return 'score-over';
            return 'score-even';
        }

        function cacheData(raw) {
            try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data: raw })); } catch(e) {}
        }

        function loadCache() {
            try {
                const c = JSON.parse(localStorage.getItem(CACHE_KEY));
                if (c && c.data) return c;
            } catch(e) {}
            return null;
        }

        // Parse Masters.com JSON feed
        function parseMastersData(data) {
            if (!data || !data.data || !data.data.player) return null;
            const players = data.data.player;

            const parsed = players.map(p => {
                try {
                    const name = p.full_name || (p.first_name + ' ' + p.last_name) || 'Unknown';
                    const scoreToPar = parseScore(p.topar);
                    const today = p.today || '--';
                    const thruVal = p.thru || '';
                    const posDisplay = p.pos || '--';

                    // Round totals
                    const rounds = [];
                    for (const rKey of ['round1','round2','round3','round4']) {
                        const r = p[rKey];
                        if (r && r.total != null) rounds.push(String(r.total));
                        else rounds.push('--');
                    }

                    // Status: Cut, WD, or tee time if not started
                    let isCut = false, isWD = false;
                    let thru = thruVal;
                    const st = (p.status || '').toUpperCase();
                    if (st === 'C' || p.pos === 'CUT') { isCut = true; thru = 'CUT'; }
                    else if (st === 'W') { isWD = true; thru = 'WD'; }
                    else if (thruVal === '18' || thruVal === 'F') { thru = 'F'; }
                    else if (!thruVal && p.teetime) { thru = p.teetime; }

                    // Sort order: "1|3||" -> second number (3) is leaderboard rank
                    const soParts = (p.sort_order || '').split('|');
                    const sortNum = (soParts.length > 1 && soParts[1]) ? parseInt(soParts[1]) : (parseInt(soParts[0]) || 999);
                    const match = matchPlayer(name);

                    return {
                        name, scoreToPar, scoreDisplay: fmt(scoreToPar),
                        today, thru, rounds, position: sortNum,
                        posDisplay, isCut, isWD,
                        team: match ? match.team : null,
                        rosterName: match ? match.playerDef.name : null
                    };
                } catch (e) {
                    console.warn('Skipping malformed player:', e);
                    return null;
                }
            }).filter(Boolean);

            parsed.sort((a, b) => a.position - b.position);
            return { competitors: parsed, tournamentName: 'Masters Tournament', tournamentStatus: '' };
        }

        // Parse ESPN API response (fallback)
        function parseESPNData(data) {
            const event = data.events && data.events[0];
            if (!event) return null;

            const competition = event.competitions && event.competitions[0];
            const competitors = competition ? competition.competitors || [] : [];

            const parsed = competitors.map(c => {
                try {
                    const athlete = c.athlete || {};
                    const displayName = athlete.displayName || 'Unknown';
                    const score = c.score != null ? c.score : 'E';
                    const scoreToPar = parseScore(typeof score === 'string' ? score : String(score));

                    let today = '--';
                    const rounds = [];
                    if (c.linescores && c.linescores.length > 0) {
                        for (const ls of c.linescores) {
                            rounds.push(ls && ls.displayValue ? ls.displayValue : '--');
                        }
                        const last = c.linescores[c.linescores.length - 1];
                        if (last && last.displayValue) today = last.displayValue;
                    }

                    let thru = '', isCut = false, isWD = false;
                    if (c.status) {
                        const st = c.status;
                        const dv = (st.displayValue || '').toUpperCase();
                        if (dv === 'CUT' || dv === 'MC') { thru = 'CUT'; isCut = true; }
                        else if (dv === 'WD') { thru = 'WD'; isWD = true; }
                        else if (dv === 'DQ') { thru = 'DQ'; isWD = true; }
                        else { thru = st.displayValue || ''; }
                    }

                    const position = c.sortOrder || 999;
                    const posDisplay = c.status && c.status.position ? c.status.position.displayName : '';
                    const match = matchPlayer(displayName);

                    return {
                        name: displayName, scoreToPar, scoreDisplay: fmt(scoreToPar),
                        today, thru, rounds, position, posDisplay: posDisplay || String(position),
                        isCut, isWD, team: match ? match.team : null,
                        rosterName: match ? match.playerDef.name : null
                    };
                } catch (e) { return null; }
            }).filter(Boolean);

            parsed.sort((a, b) => a.position - b.position);
            return { competitors: parsed, tournamentName: event.name || '', tournamentStatus: '' };
        }

        async function fetchData() {
            const spinner = document.getElementById('spinner');
            const refreshText = document.getElementById('refresh-text');
            spinner.style.display = 'inline-block';
            refreshText.textContent = 'Loading';

            let result = null;
            let fetchError = null;

            // 1. Try Masters.com first (best source during tournament)
            try {
                const resp = await fetch(MASTERS_URL, { signal: AbortSignal.timeout(10000) });
                if (resp.ok) {
                    const raw = await resp.json();
                    result = parseMastersData(raw);
                    if (result && result.competitors.length > 0) {
                        cacheData(raw);
                        consecutiveErrors = 0;
                    }
                }
            } catch (e) { fetchError = e; }

            // 2. Fallback to ESPN API
            if (!result || result.competitors.length === 0) {
                for (const url of ESPN_API_URLS) {
                    try {
                        const resp = await fetch(url, { signal: AbortSignal.timeout(10000) });
                        if (!resp.ok) continue;
                        const raw = await resp.json();
                        result = parseESPNData(raw);
                        if (result && result.competitors.length > 0) {
                            cacheData(raw);
                            consecutiveErrors = 0;
                            break;
                        }
                    } catch (e) { fetchError = e; }
                }
            }

            // 3. Try cache
            if (!result || result.competitors.length === 0) {
                const cached = loadCache();
                if (cached) {
                    // Try parsing cached data as Masters format first, then ESPN
                    result = parseMastersData(cached.data) || parseESPNData(cached.data);
                    const age = Math.round((Date.now() - cached.ts) / 60000);
                    document.getElementById('last-updated').textContent =
                        'Cached (' + age + 'm ago)';
                }
            }

            // 4. Nothing worked
            if (!result || result.competitors.length === 0) {
                consecutiveErrors++;
                const retryIn = Math.min(consecutiveErrors * 30, 300);
                if (leaderboardData.length === 0) {
                    document.getElementById('standings').innerHTML =
                        '<div class="error-msg">Could not load scores<br><small style="opacity:0.6">' +
                        (fetchError ? fetchError.message : 'All sources failed') +
                        '</small><br><small style="opacity:0.4">Retrying in ' + retryIn + 's</small>' +
                        '<br><button class="retry-btn" onclick="fetchData()">Try Now</button></div>';
                } else {
                    document.getElementById('last-updated').textContent = 'Refresh failed';
                }
                setTimeout(fetchData, retryIn * 1000);
                spinner.style.display = 'none';
                refreshText.textContent = 'Refresh';
                return;
            }

            try {

                leaderboardData = result.competitors;

                const banner = document.getElementById('status-banner');
                const isMasters = (result.tournamentName || '').toLowerCase().includes('masters');
                if (!isMasters && result.tournamentName) {
                    banner.className = 'status-banner';
                    banner.textContent = 'Showing: ' + result.tournamentName;
                } else if (result.tournamentStatus && result.tournamentStatus !== 'In Progress') {
                    banner.className = 'status-banner';
                    banner.textContent = result.tournamentStatus;
                } else {
                    banner.className = '';
                    banner.textContent = '';
                }

                let matched = 0, total = 0;
                for (const t of Object.values(TEAMS)) {
                    for (const p of t.players) {
                        total++;
                        if (leaderboardData.some(ld => ld.rosterName === p.name)) matched++;
                    }
                }
                if (matched < total) console.warn('Matched ' + matched + '/' + total + ' roster players');

                render();
                if (!document.getElementById('last-updated').textContent.startsWith('Cached')) {
                    document.getElementById('last-updated').textContent =
                        'Updated ' + new Date().toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
                }
            } catch (err) {
                console.error('Parse error:', err);
                if (leaderboardData.length === 0) {
                    document.getElementById('standings').innerHTML =
                        '<div class="error-msg">Error reading data<br><small style="opacity:0.6">' +
                        err.message + '</small><br><button class="retry-btn" onclick="fetchData()">Try Again</button></div>';
                }
            } finally {
                spinner.style.display = 'none';
                refreshText.textContent = 'Refresh';
            }
        }

        function render() {
            renderStandings();
            renderLeaderboard();
        }

        function renderStandings() {
            const el = document.getElementById('standings');

            const teams = Object.entries(TEAMS).map(([name, data]) => {
                const players = data.players.map(p => {
                    const found = leaderboardData.find(ld => ld.rosterName === p.name);
                    return {
                        name: p.name,
                        scoreToPar: found ? found.scoreToPar : 0,
                        scoreDisplay: found ? found.scoreDisplay : 'E',
                        today: found ? found.today : '--',
                        thru: found ? found.thru : '--',
                        posDisplay: found ? found.posDisplay : '--',
                        rounds: found ? found.rounds : [],
                        isCut: found ? found.isCut : false,
                        isWD: found ? found.isWD : false
                    };
                });

                players.sort((a, b) => {
                    const aOut = a.isCut || a.isWD;
                    const bOut = b.isCut || b.isWD;
                    if (aOut && !bOut) return 1;
                    if (!aOut && bOut) return -1;
                    return a.scoreToPar - b.scoreToPar;
                });

                const top4 = players.slice(0, 4);
                const total = top4.reduce((s, p) => s + p.scoreToPar, 0);

                return { name, players, total, totalDisplay: fmt(total) };
            });

            teams.sort((a, b) => a.total - b.total);

            el.innerHTML = teams.map((t, idx) => {
                const rank = idx + 1;
                const isOpen = openTeams.has(t.name);
                return `
                    <div class="team-card ${isOpen ? 'open' : ''}" id="card-${t.name}">
                        <div class="team-header" onclick="toggleTeam('${t.name}')">
                            <div class="team-rank rank-${rank}">${rank}</div>
                            <div class="team-info">
                                <div class="team-name">${t.name}</div>
                                <div class="team-detail">Best 4 of 8</div>
                            </div>
                            <div class="team-score">
                                <div class="team-total ${cls(t.total)}">${t.totalDisplay}</div>
                                <div class="team-total-label">Total</div>
                            </div>
                            <span class="toggle-arrow">&#9660;</span>
                        </div>
                        <div class="team-players ${isOpen ? 'open' : ''}">
                            ${t.players.map((p, i) => {
                                const counting = i < 4 && !p.isCut && !p.isWD;
                                const rowCls = (p.isCut || p.isWD) ? 'cut' : (counting ? 'counting' : 'bench');
                                return `
                                    <div class="player-row ${rowCls}">
                                        <div class="player-pos">${p.posDisplay}</div>
                                        <div class="player-dot"></div>
                                        <div class="player-name">${shortName(p.name)}</div>
                                        <div class="player-rounds">${[0,1,2,3].map(r => '<div class="player-rd">' + (p.rounds[r] || '--') + '</div>').join('')}</div>
                                        <div class="player-thru">${fmtThru(p.thru)}</div>
                                        <div class="player-today ${cls(parseScore(p.today))}">${p.today || '--'}</div>
                                        <div class="player-score ${cls(p.scoreToPar)}">${p.scoreDisplay}</div>
                                    </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            }).join('');
        }

        function renderLeaderboard() {
            const el = document.getElementById('leaderboard');
            const rows = leaderboardData;

            el.innerHTML = `
                <div class="lb-header-row">
                    <div class="lb-pos">Pos</div>
                    <div class="lb-team">Team</div>
                    <div class="lb-name">Player</div>
                    <div class="lb-rounds">${['R1','R2','R3','R4'].map(r => '<div class="lb-rd">' + r + '</div>').join('')}</div>
                    <div class="lb-thru">Thru</div>
                    <div class="lb-today">Tdy</div>
                    <div class="lb-score">Tot</div>
                </div>
                ${rows.map(p => `
                    <div class="lb-row ${p.team ? 'rostered' : ''}">
                        <div class="lb-pos">${p.posDisplay}</div>
                        <div class="lb-team ${p.team ? TEAM_COLORS[p.team] : ''}">${p.team || ''}</div>
                        <div class="lb-name">${shortName(p.name)}</div>
                        <div class="lb-rounds">${[0,1,2,3].map(r => '<div class="lb-rd">' + (p.rounds[r] || '--') + '</div>').join('')}</div>
                        <div class="lb-thru">${fmtThru(p.thru)}</div>
                        <div class="lb-today ${cls(parseScore(p.today))}">${p.today || '--'}</div>
                        <div class="lb-score ${cls(p.scoreToPar)}">${p.scoreDisplay}</div>
                    </div>`).join('')}`;
        }

        function toggleTeam(name) {
            if (openTeams.has(name)) openTeams.delete(name);
            else openTeams.add(name);
            const card = document.getElementById('card-' + name);
            card.classList.toggle('open');
            card.querySelector('.team-players').classList.toggle('open');
        }

            leaderboardData.sort((a, b) => a.position - b.position);

            const banner = document.getElementById('status-banner');

        // ── SPLASH SCREEN ──
        let splashDismissed = false;
        function dismissSplash() {
            if (splashDismissed) return;
            splashDismissed = true;
            const splash = document.getElementById('splash');
            splash.classList.add('fade-out');
            setTimeout(() => splash.remove(), 500);
        }

        // Force fresh GIF load (cache-bust so it starts from frame 1)
        const gifEl = document.getElementById('splash-gif');
        gifEl.src = 'https://i.imgflip.com/2unhs.gif?' + Date.now();

        // The GIF is ~4 seconds. Let it play one full loop then auto-dismiss.
        // User can also tap to skip at any time.
        setTimeout(dismissSplash, 4000);

        // ── INIT ──
        fetchData().then(() => {
            if (leaderboardData.length === 0) loadDummyData();
        });
        let refreshInterval = setInterval(fetchData, 60000);
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearInterval(refreshInterval);
            } else {
                fetchData();
                refreshInterval = setInterval(fetchData, 60000);
            }
        });
    </script>
